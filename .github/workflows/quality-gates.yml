name: quality-gates

on:
  pull_request:
  push:
    branches: [main, master]

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v5
        with:
          node-version: 22

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          npm ci
          python -m venv backend/.venv
          backend/.venv/bin/pip install --upgrade pip
          backend/.venv/bin/pip install -e "backend/.[dev]"

      - name: Policy checks
        run: node scripts/ci/require-tests-and-docs.mjs

      - name: Verify commands
        run: bash .codex/scripts/run_verify_commands.sh

      - name: Diff coverage
        run: |
          python -m pip install --upgrade pip diff-cover
          if [ ! -f coverage/lcov.info ]; then
            echo "coverage/lcov.info not present; skipping diff-cover gate"
            exit 0
          fi
          if git rev-parse --verify origin/master >/dev/null 2>&1; then
            BASE_BRANCH="origin/master"
          else
            BASE_BRANCH="origin/main"
          fi
          diff-cover coverage/lcov.info --compare-branch="${BASE_BRANCH}" --fail-under=90

      - name: Upload test artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-artifacts
          path: |
            playwright-report/
            test-results/
            coverage/
